services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: promotion-club-app
    env_file:
      - .env
    volumes:
      - app_storage:/storage
    depends_on:
      - redis-cache
      - redis-password-reset

  nginx:
    image: nginx:alpine
    container_name: promotion-club-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - app_storage:/storage:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    command: [nginx, "-g", "daemon off; error_log /dev/null;"]
    depends_on:
      - app

  certbot:
    image: certbot/certbot
    container_name: promotion-club-certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    command: renew --webroot -w /var/www/certbot
    depends_on:
      - nginx

  redis-cache:
    image: "redis:alpine"
    container_name: promotion-club-redis-cache
    command: redis-server --port 6379
    ports:
      - "6379:6379"
    volumes:
      - redis_cache_data:/data

  redis-password-reset:
    image: "redis:alpine"
    container_name: promotion-club-redis-password-reset
    command: redis-server --port 6380
    ports:
      - "6380:6380"
    volumes:
      - redis_password_reset_data:/data

volumes:
  redis_cache_data:
  redis_password_reset_data:
  app_storage:
