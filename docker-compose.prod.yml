services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: indaiatuba-new-back-app
    env_file:
      - .env
    volumes:
      - app_storage:/storage
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    container_name: indaiatuba-new-back-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - app_storage:/storage:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    command: ["sh", "-c", "touch /var/log/nginx/access.log /var/log/nginx/error.log && chown -R nginx:nginx /var/log/nginx && exec nginx -g 'daemon off;' -g 'error_log /var/log/nginx/error.log;'"]
    depends_on:
      - app

  certbot:
    image: certbot/certbot
    container_name: indaiatuba-new-back-certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    command: renew --webroot -w /var/www/certbot
    depends_on:
      - nginx

  redis:
    image: "redis:alpine"
    container_name: indaiatuba-new-back-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
  app_storage:
  nginx_logs:
