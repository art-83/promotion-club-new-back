name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Write firebase credentials
        run: |
          mkdir -p src/config dist/config
          echo '${{ secrets.FIREBASE_CREDENTIALS }}' > src/config/promotion-club-pusher-firebase-credentials.json
          cp src/config/promotion-club-pusher-firebase-credentials.json dist/config/promotion-club-pusher-firebase-credentials.json

      - name: Write SSL certificate
        env:
          SSL_CERTIFICATE: ${{ secrets.SSL_CERTIFICATE }}
        run: |
          mkdir -p dist/config
          echo "$SSL_CERTIFICATE" > dist/config/sa-east-1-bundle.pem

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_ENV: ${{ secrets.SSH_ENV }}
        run: |
          # Define remote directory
          REMOTE_DIR="/home/$SSH_USER/indaiatuba-new-back"

          # Create remote directory if it doesn't exist
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "mkdir -p $REMOTE_DIR"

          # Sync files to VPS (excluding node_modules and other unnecessary files)
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'storage' \
            -e "ssh -p $SSH_PORT" \
            ./ $SSH_USER@$SSH_HOST:$REMOTE_DIR/

          # Create .env file on VPS from secret
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "echo '$SSH_ENV' > $REMOTE_DIR/.env"

          # Stop and remove existing containers, then rebuild and start
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "cd $REMOTE_DIR && \
            docker compose -f docker-compose.prod.yml down && \
            docker compose -f docker-compose.prod.yml build --no-cache && \
            docker compose -f docker-compose.prod.yml up -d && \
            docker compose -f docker-compose.prod.yml ps && \
            docker compose -f docker-compose.prod.yml logs --tail=50"

      - name: Verify Deployment
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          REMOTE_DIR="/home/$SSH_USER/indaiatuba-new-back"
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "cd $REMOTE_DIR && \
            echo 'Checking container health...' && \
            docker compose -f docker-compose.prod.yml ps && \
            echo 'Application deployed successfully!'"

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa
