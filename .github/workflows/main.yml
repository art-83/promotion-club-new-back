name: CI/CD Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Build
      run: npm run build

    - name: Verify build output
      run: |
        echo "Checking if dist directory exists..."
        ls -la dist/ || echo "dist directory not found!"
        echo "Checking required files..."
        ls -la package.json package-lock.json docker-compose.yml Dockerfile || echo "Some files missing!"

    - name: Create .env file
      run: |
        echo "${{ secrets.SSH_ENV }}" > .env
        echo ".env file created successfully"

    - name: Prepare VPS directory
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          echo "Stopping Docker containers..."
          cd /home/user/app 2>/dev/null || true
          sudo docker-compose down 2>/dev/null || true
          echo "Preparing deployment directory..."
          mkdir -p /home/user/app
          cd /home/user/app
          rm -rf dist package.json package-lock.json docker-compose.yml Dockerfile .env 2>/dev/null || true
          echo "Directory cleaned and ready"
          ls -la /home/user/app || echo "Directory is empty (expected)"

    - name: Copy files to VPS
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT }}
        source: "dist,package.json,package-lock.json,docker-compose.yml,Dockerfile,.env"
        target: "/home/user/app"
        rm: false
        debug: true

    - name: Deploy to VPS
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          cd /home/user/app
          sudo docker-compose down
          sudo docker-compose up -d --build