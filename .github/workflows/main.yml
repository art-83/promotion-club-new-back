name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_ENV: ${{ secrets.SSH_ENV }}
        run: |
          # Define remote directory
          REMOTE_DIR="/home/$SSH_USER/indaiatuba-new-back"
          
          # Create remote directory if it doesn't exist
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "mkdir -p $REMOTE_DIR"
          
          # Sync files to VPS (excluding node_modules, dist, and other unnecessary files)
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'storage' \
            -e "ssh -p $SSH_PORT" \
            ./ $SSH_USER@$SSH_HOST:$REMOTE_DIR/
          
          # Create .env file on VPS from secret
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "echo '$SSH_ENV' > $REMOTE_DIR/.env"
          
          # Stop and remove existing containers, then rebuild and start
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "cd $REMOTE_DIR && \
            docker compose down && \
            docker compose build --no-cache && \
            docker compose up -d && \
            docker compose ps && \
            docker compose logs --tail=50"

      - name: Verify Deployment
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          REMOTE_DIR="/home/$SSH_USER/indaiatuba-new-back"
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "cd $REMOTE_DIR && \
            echo 'Checking container health...' && \
            docker compose ps && \
            echo 'Application deployed successfully!'"

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa

