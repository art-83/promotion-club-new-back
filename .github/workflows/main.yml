name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Write SSL certificate
        env:
          SSL_CERTIFICATE: ${{ secrets.SSL_CERTIFICATE }}
        run: |
          mkdir -p dist/config
          echo "$SSL_CERTIFICATE" > dist/config/sa-east-1-bundle.pem

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_ENV: ${{ secrets.SSH_ENV }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
        run: |
          # Define remote directory
          REMOTE_DIR="/home/$SSH_USER/indaiatuba-new-back"
          CERT_PATH="/etc/letsencrypt/live/api.appclubededescontos.com.br/fullchain.pem"

          # Create remote directory if it doesn't exist
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "mkdir -p $REMOTE_DIR"

          # Sync files to VPS (only prod compose; exclude node_modules, src, other compose files)
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude 'src' \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'storage' \
            --exclude 'docker-compose.yml' \
            --exclude 'docker-compose.dev.yml' \
            -e "ssh -p $SSH_PORT" \
            ./ $SSH_USER@$SSH_HOST:$REMOTE_DIR/

          # Create .env file on VPS from secret
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "echo '$SSH_ENV' > $REMOTE_DIR/.env"

          # Stop containers, rebuild, then start app and redis only (nginx needs certs first)
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "cd $REMOTE_DIR && \
            docker compose -f docker-compose.prod.yml down && \
            docker compose -f docker-compose.prod.yml build --no-cache && \
            docker compose -f docker-compose.prod.yml up -d app redis"

          # Ensure cert dirs exist; if cert missing and CERTBOT_EMAIL set, obtain cert via standalone (port 80 free while nginx is down)
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "sudo mkdir -p /etc/letsencrypt /var/www/certbot" || true
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST " \
            if [ ! -f $CERT_PATH ]; then \
              if [ -n \"$CERTBOT_EMAIL\" ]; then \
                docker run --rm --network host \
                  -v /etc/letsencrypt:/etc/letsencrypt \
                  -v /var/www/certbot:/var/www/certbot \
                  certbot/certbot certonly \
                  --standalone \
                  -d api.appclubededescontos.com.br \
                  --email \"$CERTBOT_EMAIL\" \
                  --agree-tos \
                  --non-interactive; \
              else \
                echo 'Certificate not found. Set CERTBOT_EMAIL secret for first-time issuance, or create cert manually.'; \
                exit 1; \
              fi; \
            fi"

          # Start nginx (cert exists or was just obtained)
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "cd $REMOTE_DIR && \
            docker compose -f docker-compose.prod.yml up -d nginx && \
            docker compose -f docker-compose.prod.yml ps && \
            docker compose -f docker-compose.prod.yml logs --tail=50"

          # Install/update cert renewal cron job on the server (runs at 3am on the 1st and 15th)
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST " \
            ( crontab -l 2>/dev/null | grep -v 'certbot'; \
              echo '0 3 1,15 * * docker run --rm --network host -v /etc/letsencrypt:/etc/letsencrypt -v /var/www/certbot:/var/www/certbot certbot/certbot renew --webroot -w /var/www/certbot --quiet && docker compose -f $REMOTE_DIR/docker-compose.prod.yml exec nginx nginx -s reload' \
            ) | crontab -"

      - name: Verify Deployment
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          REMOTE_DIR="/home/$SSH_USER/indaiatuba-new-back"
          ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "cd $REMOTE_DIR && \
            echo 'Checking container health...' && \
            docker compose -f docker-compose.prod.yml ps && \
            echo 'Application deployed successfully!'"

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa
