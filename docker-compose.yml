version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: indaiatuba-new-back-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - app_storage:/storage
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    container_name: indaiatuba-new-back-db
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: "redis:alpine"
    container_name: indaiatuba-new-back-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pgdata:
  redis_data:
  app_storage:
