server {
    listen 80;
    server_name api.appclubededescontos.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.appclubededescontos.com.br;

    ssl_certificate /etc/letsencrypt/live/api.appclubededescontos.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.appclubededescontos.com.br/privkey.pem;


    location /files/ {
        alias /storage/files/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location / {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
